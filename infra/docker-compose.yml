name: toolshare-infra

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: toolshare-postgres:local
    container_name: toolshare-postgres
    environment:
      POSTGRES_USER: toolshare
      POSTGRES_PASSWORD: toolshare
      POSTGRES_DB: toolshare
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toolshare -d toolshare"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.3-alpine3.23
    container_name: toolshare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.8
    container_name: toolshare-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "9092:9092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v3.7.2
    container_name: toolshare-redpanda-console
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8080:8080"

  opensearch:
    image: opensearchproject/opensearch:3.6.0
    container_name: toolshare-opensearch
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "ToolshareLocal123!"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --silent --fail --insecure --user admin:ToolshareLocal123! https://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.6.0
    container_name: toolshare-opensearch-dashboards
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: "ToolshareLocal123!"
      OPENSEARCH_SSL_VERIFICATIONMODE: none
    ports:
      - "5601:5601"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: toolshare-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: toolshare
      MINIO_ROOT_PASSWORD: toolshare-local-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.29
    container_name: toolshare-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/temporal:1.7.0
    container_name: toolshare-temporal
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --ui-ip
      - 0.0.0.0
    ports:
      - "7233:7233"
      - "8233:8233"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  redpanda-data:
  opensearch-data:
  minio-data:

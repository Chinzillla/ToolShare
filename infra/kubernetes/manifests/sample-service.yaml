apiVersion: v1
kind: Namespace
metadata:
  name: toolshare-sample
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-web
  namespace: toolshare-sample
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-web
  template:
    metadata:
      labels:
        app: sample-web
    spec:
      containers:
        - name: sample-web
          image: nginx:1.29.4-alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sample-web
  namespace: toolshare-sample
spec:
  selector:
    app: sample-web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-web
  namespace: toolshare-sample
spec:
  rules:
    - host: sample.toolshare.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-web
                port:
                  number: 80
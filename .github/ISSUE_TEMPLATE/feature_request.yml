name: Feature Request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels: "enhancement"
body:
  - type: textarea
    id: request
    attributes:
      label: What would you like to see?
      description: Briefly describe the feature or improvement.
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why is this needed?
      description: Explain the problem this solves or the workflow it improves.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: How should it work?
      description: Describe the expected behavior. Examples are helpful but not required.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, screenshots, alternatives, or constraints here.
    validations:
      required: false

name: Media Service CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  media-service:
    name: Media Service
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        working-directory: services/media-service
        run: pip install -r requirements-dev.txt

      - name: Check Python lint
        working-directory: services/media-service
        run: python -m ruff check .

      - name: Check Python formatting
        working-directory: services/media-service
        run: python -m ruff format --check .

      - name: Run unit tests
        working-directory: services/media-service
        run: python -m pytest -m "not integration"

      - name: Start MinIO
        run: docker compose -f infra/docker-compose.yml up -d --build --wait minio

      - name: Create private media buckets
        run: docker compose -f infra/docker-compose.yml run --rm --build minio-bootstrap

      - name: Run MinIO integration tests
        working-directory: services/media-service
        run: python -m pytest -m integration

      - name: Build Docker image
        run: docker build -f services/media-service/Dockerfile -t toolshare-media-service services/media-service

      - name: Clean up MinIO
        if: always()
        run: |
          docker compose -f infra/docker-compose.yml rm -sf minio-bootstrap minio
          docker volume rm toolshare-infra_minio-data || true

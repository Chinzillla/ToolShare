name: Service Templates CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nestjs-template:
    name: NestJS template
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript lint
        run: pnpm --filter @toolshare/nestjs-template lint:check

      - name: Check TypeScript formatting
        run: pnpm --filter @toolshare/nestjs-template format:check

      - name: Run unit tests
        run: pnpm --filter @toolshare/nestjs-template test

      - name: Build
        run: pnpm --filter @toolshare/nestjs-template build

      - name: Run e2e tests
        run: pnpm --filter @toolshare/nestjs-template test:e2e

      - name: Build Docker image
        run: docker build -f services/nestjs-template/Dockerfile -t toolshare-nestjs-template services/nestjs-template

  fastapi-template:
    name: FastAPI template
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        working-directory: services/fastapi-template
        run: pip install -r requirements-dev.txt

      - name: Check Python lint
        working-directory: services/fastapi-template
        run: python -m ruff check .

      - name: Check Python formatting
        working-directory: services/fastapi-template
        run: python -m ruff format --check .

      - name: Run tests
        working-directory: services/fastapi-template
        run: python -m pytest

      - name: Build Docker image
        run: docker build -f services/fastapi-template/Dockerfile -t toolshare-fastapi-template services/fastapi-template

  media-service:
    name: Media Service
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.3"

      - name: Install dependencies
        working-directory: services/media-service
        run: pip install -r requirements-dev.txt

      - name: Check Python lint
        working-directory: services/media-service
        run: python -m ruff check .

      - name: Check Python formatting
        working-directory: services/media-service
        run: python -m ruff format --check .

      - name: Run unit tests
        working-directory: services/media-service
        run: python -m pytest -m "not integration"

      - name: Start MinIO
        run: docker compose -f infra/docker-compose.yml up -d --build --wait minio

      - name: Create private media buckets
        run: docker compose -f infra/docker-compose.yml run --rm --build minio-bootstrap

      - name: Run MinIO integration tests
        working-directory: services/media-service
        run: python -m pytest -m integration

      - name: Build Docker image
        run: docker build -f services/media-service/Dockerfile -t toolshare-media-service services/media-service

      - name: Clean up MinIO
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v

  database-infrastructure:
    name: Database Infrastructure
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Initialize service databases
        run: pnpm db:reset --yes

      - name: Test database ownership boundaries
        run: pnpm db:test

      - name: Clean up database infrastructure
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
